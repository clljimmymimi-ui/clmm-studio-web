<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CLMM - LAB</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Inter+Tight:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f9f9f7",
                        "primary": "#283424",
                        "on-surface": "#1a1c1b",
                        "surface-container-low": "#f4f4f2",
                    },
                    fontFamily: {
                        "headline": ["Inter Tight"],
                        "body": ["Inter"],
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            /* 沿用总监调好的缩放比例 */
            --zoom: 0.9; 
        }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f9f9f7; }
        h1, h2, h3, .font-tight { font-family: 'Inter Tight', sans-serif; letter-spacing: 0.1em; }
        
        /* 坐标纸网格底纹 */
        .grid-pattern { 
            background-image: 
                linear-gradient(rgba(62, 75, 57, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(62, 75, 57, 0.08) 1px, transparent 1px);
            background-size: 16px 16px;
        }
        /* 导航栏动态效果 */
        #main-nav { transition: background-color 0.5s ease-in-out; }
        .scrolled#main-nav { background-color: #3E4B39 !important; }
        .scrolled #nav-brand, .scrolled .nav-link { color: #F9F9F7 !important; }
        .scrolled .nav-btn-active { background-color: #F9F9F7 !important; color: #3E4B39 !important; }
        .scrolled .nav-btn-outline { border-color: #F9F9F7 !important; color: #F9F9F7 !important; }
        /* --- 剪贴簿核心样式 (总监调优版) --- */
        .oval-clip { 
            clip-path: ellipse(45% 50% at 50% 50%); 
            width: 100%;
        }
        .canvas-container {
            width: 95%;
            max-width: 1400px;
            aspect-ratio: 1400 / 1080;
            position: relative;
            margin: 10px auto;
        }
        .img-layer {
            position: absolute;
            transform: scale(var(--zoom));
            transform-origin: top left;
        }
        .img-layer img {
            width: 100%; height: auto; display: block;
            border: none !important; box-shadow: none !important;
        }
        .align-right {
            right: 0;
            transform-origin: top right;
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
    <nav class="fixed top-0 w-full z-[120] bg-[#F9F9F7]/90 backdrop-blur-md" id="main-nav">
        <div class="flex justify-between items-center px-8 py-6 max-w-[1440px] mx-auto">
            <div class="text-xl font-black tracking-[0.1em] text-[#3E4B39] uppercase font-tight leading-none" id="nav-brand">CLMM STUDIO</div>

                <a class="nav-btn nav-btn-outline nav-link text-[#3E4B39] border border-[#3E4B39] rounded-full w-24 py-2 hover:bg-[#3E4B39]/5 transition-all font-tight text-xs font-bold hover:scale-105 text-center flex items-center justify-center" href="index.html">HOME</a>
                <a class="nav-btn nav-btn-outline nav-link text-[#3E4B39] border border-[#3E4B39] rounded-full w-24 py-2 hover:bg-[#3E4B39]/5 transition-all font-tight text-xs font-bold hover:scale-105 text-center flex items-center justify-center" href="work.html">WORK</a>
                <a class="nav-btn nav-btn-active bg-[#3E4B39] text-[#F9F9F7] rounded-full w-24 py-2 font-tight text-xs font-bold hover:scale-105 text-center flex items-center justify-center" href="lab.html">LAB</a>
            </div>
        </div>
    </nav>
    <main class="pt-[72px]">

                <h2 class="text-6xl font-black text-[#3E4B39] font-tight leading-[0.9] uppercase tracking-tighter">HOBBIES<br>LAB</h2>

            <div class="canvas-container">

                </div>

                </div>
                <div class="img-layer align-right top-[13%] w-[42%] z-30">

                </div>
                <div class="img-layer bottom-[10%] right-[11%] w-[14%] z-50">

                </div>

                </div>
                <div class="absolute bottom-[12%] left-[2%] z-50">
                    <div class="text-[10px] font-black text-[#3E4B39]/50 space-y-0.5 uppercase tracking-widest font-tight leading-none">
                        <p>#BOARD GAME</p><p>#SPORTS</p><p>#TRAVEL</p><p>#VISION</p><p>#FOOD</p>
                        <p>#MUSIC</p><p>#CAMP</p><p>#PLAY</p><p>#HEALTH</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="w-full py-12 px-8 border-t border-primary/5 bg-surface">
        <div class="max-w-[1440px] mx-auto flex justify-between items-center">
            <div class="text-sm font-black tracking-[0.1em] text-[#3E4B39] uppercase font-tight leading-none">CLMM STUDIO</div>
            <div class="text-[10px] font-bold tracking-widest text-primary/20 uppercase font-tight leading-none">©2026 CLJIMMY</div>
        </div>
    </footer>
    <script>
        // 导航滚动效果
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if (nav) {
                if (window.scrollY > 50) nav.classList.add('scrolled');
                else nav.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
